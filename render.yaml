services:
  - type: web
    name: nikat-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        value: jdbc:postgresql://localhost:5432/nikat # Change this in Render dashboard
      - key: DATABASE_USERNAME
        value: postgres
      - key: DATABASE_PASSWORD
        value: postgres
      - key: JWT_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://nikat-frontend.vercel.app # Example Vercel URL
