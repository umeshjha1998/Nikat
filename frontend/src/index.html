<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Nikat</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Google Fonts: Plus Jakarta Sans and Manrope -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined|Material+Icons+Round" rel="stylesheet">
  <!-- Material Symbols Outlined (for variable icon features) -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            "background": "var(--bg)",
            "on-background": "var(--text-main)",
            "primary": "var(--primary)",
            "on-primary": "var(--text-main)",
            "primary-container": "var(--primary)",
            "on-primary-container": "var(--text-main)",
            "secondary": "var(--secondary)",
            "on-secondary": "var(--bg)",
            "secondary-container": "var(--secondary)",
            "on-secondary-container": "var(--bg)",
            "tertiary": "var(--tertiary)",
            "on-tertiary": "var(--bg)",
            "tertiary-container": "var(--tertiary)",
            "on-tertiary-container": "var(--bg)",
            "surface": "var(--card-bg)",
            "on-surface": "var(--on-surface)",
            "on-surface-variant": "var(--on-surface-variant)",
            "surface-container": "var(--surface-container)",
            "surface-container-low": "var(--surface-container-low)",
            "surface-container-high": "var(--surface-container-high)",
            "surface-container-highest": "var(--surface-container-highest)",
            "outline": "var(--border-color)",
            "outline-variant": "var(--outline-variant)",
            "on-primary-fixed": "var(--text-main)",
            "on-secondary-fixed": "var(--bg)",
            "on-tertiary-fixed": "var(--bg)",
          }
        }
      }
    }
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
