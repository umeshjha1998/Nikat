<div class="manage-shops-container">
  <h2>Manage Shops</h2>

  <div class="table-actions">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search Shops</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Golden Crust" #input>
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <div class="mat-elevation-z8">
    <table mat-table [dataSource]="dataSource" class="full-width-table">

      <!-- ID Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let row"> {{row.id}} </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Shop Name </th>
        <td mat-cell *matCellDef="let row"> {{row.name}} </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let row">
          <span [ngClass]="'status-badge ' + row.status.toLowerCase()">{{row.status}}</span>
        </td>
      </ng-container>

      <!-- Owner Column -->
      <ng-container matColumnDef="owner">
        <th mat-header-cell *matHeaderCellDef> Owner ID </th>
        <td mat-cell *matCellDef="let row"> {{row.ownerId}} </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" title="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="accent" title="Approve" *ngIf="row.status === 'PENDING_VERIFICATION'">
            <mat-icon>check_circle</mat-icon>
          </button>
          <button mat-icon-button color="warn" title="Block">
            <mat-icon>block</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="5">No data matching the filter "{{input.value}}"</td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of shops"></mat-paginator>
  </div>
</div>
