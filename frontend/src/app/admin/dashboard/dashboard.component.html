<mat-sidenav-container class="admin-container">
  <mat-sidenav mode="side" opened class="admin-sidenav">
    <div class="sidenav-header">
      <h2>Nikat Admin</h2>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/admin/users" routerLinkActive="active">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>Manage Users</span>
      </a>
      <a mat-list-item routerLink="/admin/shops" routerLinkActive="active">
        <mat-icon matListItemIcon>store</mat-icon>
        <span matListItemTitle>Manage Shops</span>
      </a>
      <a mat-list-item routerLink="/admin/services" routerLinkActive="active">
        <mat-icon matListItemIcon>build</mat-icon>
        <span matListItemTitle>Manage Services</span>
      </a>
      <!-- Other nav items like Approvals, Global Settings, Ads, etc. -->
      <a mat-list-item (click)="logout()">
        <mat-icon matListItemIcon>exit_to_app</mat-icon>
        <span matListItemTitle>Logout</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="admin-content">
    <mat-toolbar color="primary">
      <span>Admin Dashboard</span>
      <span class="spacer"></span>
      <button mat-icon-button>
        <mat-icon>notifications</mat-icon>
      </button>
    </mat-toolbar>

    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
