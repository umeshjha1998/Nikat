<div class="forgot-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Forgot Password</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p class="instruction">Enter your registered email address and we'll send you an OTP to reset your password.</p>
      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" type="email" required>
          <mat-error *ngIf="forgotForm.get('email')?.hasError('required')">Required</mat-error>
          <mat-error *ngIf="forgotForm.get('email')?.hasError('email')">Invalid email</mat-error>
        </mat-form-field>
        <button mat-raised-button color="primary" type="submit" [disabled]="forgotForm.invalid" class="full-width submit-btn">
          Send OTP
        </button>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <p class="login-link"><a routerLink="/auth/login">Back to Login</a></p>
    </mat-card-actions>
  </mat-card>
</div>
