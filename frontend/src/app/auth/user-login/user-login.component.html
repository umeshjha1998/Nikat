
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-b from-background/20 via-background/60 to-background z-10"></div>
<img class="w-full h-full object-cover" data-alt="Vibrant local community festival with colorful decorations and people" src="https://lh3.googleusercontent.com/aida-public/AB6AXuApOPVqre7pFwAw7Ic8AY-9pB7XNZTm-MIKwVgkeUdENIVjv9zRKKi007YEaIRrJ18uOE67FuQlyYA__OsObd_g2xWd1JcjYAk4HOzeDYSU7uAvrBiAf-Di2VJU257YpErwSV68G9-0Yy1iOipDMy4Ka8pwnQDUFjUj2WHRLNmtmUQNZqVqzrbLmd_fdSOopunmXs8ANSFYhUVFmLJ-k4_7wQz6eScGibPT4Jy52HjjH09aSp4kaezSErIPoG9tPEbipo8NhINsNw0Z"/>
</div>
<div class="relative z-20 w-full max-w-md px-6 py-12">
<div class="glass-panel p-8 md:p-10 rounded-xl border-outline-variant/10 shadow-2xl">
<div class="mb-10 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-surface-container mb-6">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="explore">explore</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tighter text-on-surface mb-2">Nikat</h1>
<p class="text-on-surface-variant text-sm font-medium tracking-wide">Enter your details to discover more</p>
</div>
<div *ngIf="errorMessage" class="text-error font-bold text-sm text-center mb-4 transition-all">{{ errorMessage }}</div>
<form class="space-y-6" (ngSubmit)="login()">
<div class="space-y-1.5">
<label class="block font-label text-[10px] uppercase tracking-[0.15em] text-on-surface-variant ml-1">Email or Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl transition-colors group-focus-within:text-primary" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-highest border-none rounded-xl text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/40 transition-all outline-none" placeholder="Enter your email" type="text" [(ngModel)]="email" name="email"/>
</div>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-end px-1">
<label class="block font-label text-[10px] uppercase tracking-[0.15em] text-on-surface-variant">Password</label>
<a class="text-primary-dim text-xs font-semibold hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl transition-colors group-focus-within:text-primary" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-highest border-none rounded-xl text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/40 transition-all outline-none" placeholder="••••••••" type="password" [(ngModel)]="password" name="password"/>
</div>
</div>
<div class="pt-4">
<button class="glow-button w-full py-4 rounded-xl text-on-primary-container font-headline font-bold text-base shadow-lg" type="submit">
                        Log In
                    </button>
</div>
</form>
<div class="mt-8 pt-8 border-t border-outline-variant/15 flex flex-col items-center gap-6">
<div class="flex items-center gap-4 w-full">
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">Or continue with</span>
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
</div>
<div class="grid grid-cols-2 gap-4 w-full">
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container hover:bg-surface-container-high transition-colors rounded-xl border border-outline-variant/10">
<span class="material-symbols-outlined text-xl" data-icon="google">google</span>
<span class="text-xs font-bold font-headline">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container hover:bg-surface-container-high transition-colors rounded-xl border border-outline-variant/10">
<span class="material-symbols-outlined text-xl" data-icon="apple">ios</span>
<span class="text-xs font-bold font-headline">Apple</span>
</button>
</div>
<p class="text-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-secondary-fixed-dim font-bold ml-1 hover:underline underline-offset-4 decoration-2" href="#">Create one</a>
</p>
</div>
</div>
<div class="mt-8 flex justify-center gap-6">
<a class="text-[10px] uppercase tracking-[0.2em] font-label text-on-surface-variant/60 hover:text-primary transition-colors" href="#">Privacy</a>
<a class="text-[10px] uppercase tracking-[0.2em] font-label text-on-surface-variant/60 hover:text-primary transition-colors" href="#">Terms</a>
<a class="text-[10px] uppercase tracking-[0.2em] font-label text-on-surface-variant/60 hover:text-primary transition-colors" href="#">Support</a>
</div>
</div>
<footer class="fixed bottom-0 w-full py-8 pointer-events-none opacity-40">
<div class="flex flex-col items-center justify-center">
<p class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant">© 2024 Nikat Discovery. All rights reserved.</p>
</div>
</footer>
