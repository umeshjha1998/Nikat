<!-- Top App Bar -->
<header class="app-header">
  <div class="header-content">
    <div class="logo-container" routerLink="/">
      <span class="material-icons logo-icon">explore</span>
      <span class="logo-text">Nikat</span>
    </div>
    
    <nav class="desktop-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Discover</a>
      <a routerLink="/browse" routerLinkActive="active">Shops</a>
      <a routerLink="/services" routerLinkActive="active">Services</a>
      <a routerLink="/community" routerLinkActive="active">Community</a>
    </nav>

    <div class="header-actions">
      <button class="theme-toggle" (click)="toggleTheme()" [title]="isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
        <span class="material-icons">{{ isDarkMode() ? 'light_mode' : 'dark_mode' }}</span>
      </button>

      <!-- Not logged in: Show Sign In / Join Now -->
      <ng-container *ngIf="!isLoggedIn">
        <a routerLink="/login" class="btn btn-secondary nav-btn">Sign In</a>
        <a routerLink="/register" class="btn btn-primary glow-effect nav-btn">Join Now</a>
      </ng-container>

      <!-- Logged in: Show user menu with logout -->
      <ng-container *ngIf="isLoggedIn">
        <div class="user-menu">
          <div class="user-avatar" [title]="userDisplayName">{{ userInitial }}</div>
          <span class="user-greeting">{{ currentUser?.firstName }}</span>
          <button class="btn-logout" (click)="logout()" title="Logout">
            <span class="material-icons">logout</span>
            Logout
          </button>
        </div>
      </ng-container>
    </div>
    
    <button class="mobile-menu-btn">
      <span class="material-icons">menu</span>
    </button>
  </div>
</header>

<!-- Main Content -->
<main class="app-main">
  <router-outlet></router-outlet>
</main>
