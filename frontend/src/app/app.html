<!-- Top App Bar -->
<header class="app-header">
  <div class="header-content">
    <div class="logo-container" routerLink="/" (click)="closeMenu()">
      <span class="material-icons logo-icon">explore</span>
      <span class="logo-text">Nikat</span>
    </div>
    
    <nav class="desktop-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Discover</a>
      <a routerLink="/browse" routerLinkActive="active">Shops</a>
      <a routerLink="/services" routerLinkActive="active">Services</a>
      <a routerLink="/community" routerLinkActive="active">Community</a>
    </nav>

    <div class="header-actions">
      <app-theme-toggle></app-theme-toggle>

      <!-- Not logged in: Show Sign In / Join Now -->
      <ng-container *ngIf="!isLoggedIn">
        <a routerLink="/login" class="btn btn-secondary nav-btn">Sign In</a>
        <a routerLink="/register" class="btn btn-primary glow-effect nav-btn">Join Now</a>
      </ng-container>

      <!-- Logged in: Show user menu with logout -->
      <ng-container *ngIf="isLoggedIn">
        <div class="user-menu">
          <div class="user-avatar" title="Go to Dashboard" (click)="goToDashboard()">{{ userInitial }}</div>
          <span class="user-greeting">{{ currentUser?.firstName }}</span>
          <button class="btn-logout" (click)="logout()" title="Logout">
            <span class="material-icons">logout</span>
            Logout
          </button>
        </div>
      </ng-container>
    </div>
    
    <div class="mobile-actions">
       <app-theme-toggle></app-theme-toggle>
       <button class="mobile-menu-btn" (click)="toggleMenu()">
         <span class="material-icons">{{ isMenuOpen() ? 'close' : 'menu' }}</span>
       </button>
    </div>
  </div>

  <!-- Mobile Navigation Dropdown -->
  <div class="mobile-nav" [class.open]="isMenuOpen()">
    <nav>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Discover</a>
      <a routerLink="/browse" routerLinkActive="active" (click)="closeMenu()">Shops</a>
      <a routerLink="/services" routerLinkActive="active" (click)="closeMenu()">Services</a>
      <a routerLink="/community" routerLinkActive="active" (click)="closeMenu()">Community</a>
      <hr class="mobile-divider">
      <ng-container *ngIf="!isLoggedIn">
        <a routerLink="/login" (click)="closeMenu()">Sign In</a>
        <a routerLink="/register" (click)="closeMenu()" class="mobile-join">Join Now</a>
      </ng-container>
      <ng-container *ngIf="isLoggedIn">
        <a (click)="goToDashboard()">Dashboard</a>
        <a (click)="logout()" class="mobile-logout">Logout</a>
      </ng-container>
    </nav>
  </div>
</header>

<!-- Main Content -->
<main class="app-main">
  <router-outlet></router-outlet>
</main>
