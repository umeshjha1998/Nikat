spring.application.name=Nikat Backend

# Neon PostgreSQL connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-calm-meadow-a106b6xh-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:neondb_owner}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:npg_VcTnHmJhoW06}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
# Use the core PostgreSQL dialect to avoid startup discovery overhead
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Server
server.port=${PORT:8080}
server.address=0.0.0.0

# Performance Optimizations for Render Free Tier (Optional but helpful)
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
# Faster startup by skipping some heavy scanning
spring.main.banner-mode=off
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

# Actuator Config
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Info items
info.app.name=${spring.application.name}
info.app.description=Premium Local Services Platform
info.app.version=1.0.0
info.app.status=Live & Operational
