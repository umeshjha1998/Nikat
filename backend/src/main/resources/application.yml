spring:
  application:
    name: nikat-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nikat}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:dfgsdfgsdfgsdfgsdfgsdfgsdfgsdfgsdfgsdfgsdfgsdfgsdfgsdfgsdfgsdfg}
  expiration: 86400000 # 1 day

resend:
  api:
    key: ${RESEND_API_KEY:}
  from:
    email: "onboarding@resend.dev"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200}
